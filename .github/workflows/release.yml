name: Build and Upload CLI

on:
  push:
    tags:
      - '*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - shell: bash
        env:
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }} # This pulls from the CREATE RELEASE step above, referencing it's ID to get its outputs object, which include a `upload_url`. See this blog post for more info: https://jasonet.co/posts/new-features-of-github-actions/#passing-data-to-future-steps 
        run: |
          echo ${UPLOAD_URL} > upload_url.txt
      
      # example from: https://docs.github.com/en/actions/guides/storing-workflow-data-as-artifacts
      - name: Upload math result for job 1
        uses: actions/upload-artifact@v2
        with:
          name: upload_url
          path: upload_url.txt

  build-linux:
    runs-on: ubuntu-latest
    container: 'swift:5.3-bionic'
    steps:
      - name: Get Upload URL
        uses: actions/download-artifact@v2
        with:
          name: upload_url
      
      - shell: bash
        id: get_upload_url
        run: |
          echo "::set-output name=upload_url::$(cat upload_url.txt)"

      - name: Checkout
        uses: actions/checkout@v2

      - name: Build Binary
        run: |
          export DEBIAN_FRONTEND=noninteractive DEBCONF_NONINTERACTIVE_SEEN=true
          apt-get -q update
          apt-get install -y libsqlite3-dev
          swift build --configuration release
          mv `swift build --configuration release --show-bin-path`/chia .
          chmod +x ./chia

      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
          asset_path: ./chia
          asset_name: chia-linux
          asset_content_type: application/x-binary


  build-macos:
    runs-on: macos-latest
    steps:
      - name: Get Upload URL
        uses: actions/download-artifact@v2
        with:
          name: upload_url

      - shell: bash
        id: get_upload_url
        run: |
          echo "::set-output name=upload_url::$(cat upload_url.txt)"

      - name: Checkout
        uses: actions/checkout@v2

      - name: Build Binary
        run: |
          swift build --configuration release --arch x86_64
          mv `swift build --configuration release --arch x86_64 --show-bin-path`/chia .
          chmod +x ./chia
      # swift build --configuration release --arch x86_64 --arch arm64
      # mv `swift build --configuration release --arch x86_64 --arch arm64 --show-bin-path`/chia .

      - name: Upload Release Asset
        id: upload-release-asset 
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
          asset_path: ./chia
          asset_name: chia
          asset_content_type: application/x-binary
